<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitribe - Authorization Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .success-icon {
            width: 70px;
            height: 70px;
            background: rgba(76, 175, 80, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2em;
        }
        .error-icon {
            width: 70px;
            height: 70px;
            background: rgba(244, 67, 54, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2em;
        }
        h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .success h1 { color: #4CAF50; }
        .error h1 { color: #F44336; }
        p {
            color: #888;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .participant-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #FC4C02;
            margin-bottom: 20px;
        }
        .code-box {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            word-break: break-all;
        }
        .code-box label {
            display: block;
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .code-box code {
            font-size: 0.85em;
            color: #4CAF50;
        }
        .copy-btn {
            padding: 10px 20px;
            background: #FC4C02;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .copy-btn:hover { background: #E34402; }
        .copy-btn.copied { background: #4CAF50; }
        .note {
            background: rgba(252, 76, 2, 0.08);
            border: 1px solid rgba(252, 76, 2, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #ccc;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #FC4C02;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card" id="content">
        <!-- Populated by JS -->
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state'); // participant name
        const error = params.get('error');
        const contentEl = document.getElementById('content');

        if (error) {
            contentEl.innerHTML = `
                <div class="error">
                    <div class="error-icon">&#10060;</div>
                    <h1>Authorization Denied</h1>
                    <p>You declined the Strava authorization. No worries — you can try again anytime.</p>
                    <a href="index.html" class="back-link">&larr; Back to Leaderboard</a>
                </div>
            `;
        } else if (code && state) {
            contentEl.innerHTML = `
                <div class="success">
                    <div class="success-icon">&#9989;</div>
                    <h1>Authorization Successful!</h1>
                    <div class="participant-name">${state}</div>
                    <p>Your Strava account has been connected. Please share the code below with Arun (challenge admin):</p>
                    <div class="code-box">
                        <label>Your Authorization Code</label>
                        <code id="auth-code">${code}</code>
                    </div>
                    <button class="copy-btn" onclick="copyCode()">Copy Code</button>
                    <div class="note">
                        <strong>What's next?</strong><br>
                        Send this code to Arun on WhatsApp. Once he processes it, your activities will appear on the leaderboard automatically!
                    </div>
                    <a href="index.html" class="back-link">&larr; Back to Leaderboard</a>
                </div>
            `;
        } else {
            contentEl.innerHTML = `
                <div class="error">
                    <div class="error-icon">&#10067;</div>
                    <h1>Something went wrong</h1>
                    <p>No authorization code was received. Please try again from the leaderboard page.</p>
                    <a href="index.html" class="back-link">&larr; Back to Leaderboard</a>
                </div>
            `;
        }

        function copyCode() {
            const code = document.getElementById('auth-code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
