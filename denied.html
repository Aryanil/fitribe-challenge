<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitribe - Authorization Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .icon { font-size: 3em; margin-bottom: 20px; }
        h1 { color: #FFA726; font-size: 1.5em; margin-bottom: 15px; }
        p { color: #888; line-height: 1.5; margin-bottom: 15px; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #FC4C02;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🙅</div>
        <h1>Authorization Declined</h1>
        <p>No problem! We only read your activity distances (nothing else). If you change your mind, you can try again anytime.</p>
        <a href="index.html" class="back-btn">Back to Leaderboard</a>
    </div>
</body>
</html>
